client:
  inventory:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
  item:
    base-url: ${ITEM_SERVICE_URL:http://localhost:8083}
  user:
    base-url: ${USER_SERVICE_URL:http://localhost:8084}

spring:
  application:
    name: salesService
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/erp/protocol/openid-connect/certs}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sales}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

springdoc:
  api-docs:
    path: /sales-orders/v3/api-docs
  swagger-ui:
    path: /sales-orders/swagger-ui.html
