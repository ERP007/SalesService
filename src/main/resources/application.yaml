client:
  inventory:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
  item:
    base-url: ${ITEM_SERVICE_URL:http://localhost:8083}
  user:
    base-url: ${USER_SERVICE_URL:http://localhost:8084}

# 재고 입고/출고 처리 방식. true=동기 REST(부하 테스트용), false=outbox 기반 async(기본).
sales:
  stock:
    sync-mode: ${STOCK_SYNC_MODE:false}

spring:
  application:
    name: salesService
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/erp/protocol/openid-connect/certs}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        # 재시도 소진 후 requeue 대신 reject → DLX로 격리(무한 재전달 방지)
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sales}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

springdoc:
  api-docs:
    path: /sales-orders/v3/api-docs
  swagger-ui:
    path: /sales-orders/swagger-ui.html
